name: shadowrocket-ruleset

on:
  workflow_dispatch:
  schedule:
    # UTC 22:50 = UTC+8 06:50
    - cron: "50 22 * * *"
  push:
    branches: ["main"]
    paths:
      - "txt/shadowrocket/**"
      - ".github/scripts/shadowrocket-ruleset.sh"
      - ".github/workflows/shadowrocket-ruleset.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install dependencies (jq, yq, curl)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq curl ca-certificates

          YQ_VERSION="v4.45.1"
          sudo curl -fsSL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          yq --version
          jq --version
          curl --version | head -n 1

      - name: Generate Shadowrocket list rules
        run: |
          set -euo pipefail
          chmod +x .github/scripts/shadowrocket-ruleset.sh
          .github/scripts/shadowrocket-ruleset.sh

      - name: Commit outputs to repo
        id: commit
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          export TZ=Asia/Shanghai
          COMMIT_TIME="$(date '+%Y-%m-%d %H:%M:%S')"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add compilation/shadowrocket

          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "$COMMIT_TIME"
          git checkout . || true
          git pull origin main --rebase -Xours
          git push origin HEAD:${GITHUB_REF_NAME}

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr CDN cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -e
          URL="https://purge.jsdelivr.net/gh/purecores/Proxy-Rules@main/compilation/shadowrocket/"
          echo "Purging: $URL"
          curl -s "$URL"