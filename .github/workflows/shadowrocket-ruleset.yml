name: shadowrocket-ruleset

on:
  workflow_dispatch:
  schedule:
    # Runs at 06:40 CST (UTC+8)
    - cron: "00 23 * * *"
  push:
    branches: ["main"]
    paths:
      - "compilation/mihomo/**.yaml"
      - ".github/scripts/shadowrocket-ruleset.sh"
      - ".github/workflows/shadowrocket-ruleset.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Normalize line endings
        run: |
          sed -i 's/\r$//' .github/scripts/shadowrocket-ruleset.sh
          chmod +x .github/scripts/shadowrocket-ruleset.sh

      - name: Generate Shadowrocket lists
        run: |
          .github/scripts/shadowrocket-ruleset.sh

      - name: Commit and push if changed
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export TZ=Asia/Shanghai
          COMMIT_TIME="$(date '+%Y-%m-%d %H:%M:%S')"

          # 只检查目标输出目录是否有变化
          if git diff --quiet compilation/shadowrocket; then
            echo "Output files have not changed. Skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add compilation/shadowrocket
          git commit -m "$COMMIT_TIME"
          git checkout .
          git pull origin main --rebase
          git push origin HEAD:main

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -e
          URL="https://purge.jsdelivr.net/gh/purecores/Proxy-Rules@main/compilation/shadowrocket"
          echo "Purging: $URL"
          curl -s "$URL"
