name: build-dat

on:
  workflow_dispatch:
  schedule:
    # Runs at 03:00 CST (UTC+8), 1 hour after mihomo-ruleset
    - cron: "0 19 * * *"
  push:
    branches: ["main"]
    paths:
      - "txt/mihomo/AIGC.txt"
      - "txt/mihomo/Community.txt"
      - "txt/mihomo/Direct.txt"
      - "txt/mihomo/Proxy.txt"
      - "txt/mihomo/ip.txt"
      - "txt/mihomo/extra.yaml"
      - "personaluse/**"
      - ".github/scripts/build-dat.py"
      - ".github/workflows/build-dat.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Build GeoSite.dat and GeoIP.dat
        run: python3 .github/scripts/build-dat.py

      - name: Commit outputs to repo
        id: commit
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          export TZ=Asia/Shanghai
          COMMIT_TIME="$(date '+%Y-%m-%d %H:%M:%S')"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add compilation/GeoSite.dat compilation/GeoIP.dat

          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "$COMMIT_TIME"
          git pull origin main --rebase -Xours
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr CDN cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -e
          URL="https://purge.jsdelivr.net/gh/purecores/Proxy-Rules@main/compilation/"
          echo "Purging: $URL"
          curl -s "$URL"
